<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);">Interaktive Simulation der Phasenverschiebung zwischen Strom und Spannung bei ohmschem, kapazitivem und induktivem Widerstand</h2>

<div style="display:flex; gap:8px; margin:0 0 1rem; flex-wrap:wrap;">
  <button id="btnR" onclick="setMode('R')">Ohmsch (R)</button>
  <button id="btnC" onclick="setMode('C')">Kondensator (C)</button>
  <button id="btnL" onclick="setMode('L')">Spule (L)</button>
</div>

<div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin:0 0 1rem;">
  <div style="background:var(--surface-1); border-radius:var(--radius); padding:1rem;">
    <div style="font-size:13px; color:var(--text-muted);">Phasenverschiebung</div>
    <div id="phiOut" style="font-size:24px; font-weight:500;">0°</div>
  </div>
  <div style="background:var(--surface-1); border-radius:var(--radius); padding:1rem;">
    <div style="font-size:13px; color:var(--text-muted);">Merkregel</div>
    <div id="ruleOut" style="font-size:14px; margin-top:4px;">U und I sind in Phase</div>
  </div>
</div>

<div style="display:flex; align-items:center; gap:12px; margin:0 0 1rem;">
  <label style="font-size:14px; color:var(--text-secondary); min-width:70px;">Frequenz</label>
  <input type="range" min="1" max="10" step="1" value="4" id="freq" style="flex:1;" />
  <span id="freqOut" style="font-size:14px; font-weight:500; min-width:40px;">4</span>
  <button id="btnPause" onclick="togglePause()" style="min-width:44px;" aria-label="Pause"><i class="ti ti-player-pause" aria-hidden="true"></i></button>
</div>

<div style="display:flex; gap:16px; align-items:center; margin:0 0 8px; font-size:13px;">
  <span style="display:flex; align-items:center; gap:6px;"><span style="width:18px; height:3px; background:#378ADD; display:inline-block; border-radius:2px;"></span><span style="color:var(--text-secondary);">Spannung U(t)</span></span>
  <span style="display:flex; align-items:center; gap:6px;"><span style="width:18px; height:3px; background:#D85A30; display:inline-block; border-radius:2px;"></span><span style="color:var(--text-secondary);">Strom I(t)</span></span>
</div>

<div style="display:grid; grid-template-columns:1fr 180px; gap:12px; align-items:center;">
  <canvas id="wave" width="460" height="220" style="width:100%; height:auto;"></canvas>
  <canvas id="phasor" width="180" height="220" style="width:100%; height:auto;"></canvas>
</div>

<script>
const modes = {
  R: { phi: 0, label: '0°', rule: 'U und I sind in Phase' },
  C: { phi: Math.PI/2, label: '−90° (I eilt U voraus)', rule: 'Kondensator: Strom eilt vor' },
  L: { phi: -Math.PI/2, label: '+90° (I hinkt U hinterher)', rule: 'Spule: Strom kommt zu spät' }
};
let mode = 'R', t = 0, paused = false, freq = 4;
const waveC = document.getElementById('wave'), phC = document.getElementById('phasor');
const wctx = waveC.getContext('2d'), pctx = phC.getContext('2d');
const css = v => getComputedStyle(document.documentElement).getPropertyValue(v).trim() || '#888';

function setMode(m){
  mode = m;
  document.getElementById('phiOut').textContent = modes[m].label;
  document.getElementById('ruleOut').textContent = modes[m].rule;
  ['R','C','L'].forEach(k=>{
    const b = document.getElementById('btn'+k);
    b.style.borderColor = (k===m) ? '#378ADD' : '';
    b.style.borderWidth = (k===m) ? '2px' : '';
  });
}
function togglePause(){
  paused = !paused;
  document.getElementById('btnPause').innerHTML = paused ? '<i class="ti ti-player-play" aria-hidden="true"></i>' : '<i class="ti ti-player-pause" aria-hidden="true"></i>';
}
document.getElementById('freq').addEventListener('input', e=>{
  freq = Number(e.target.value);
  document.getElementById('freqOut').textContent = freq;
});

function draw(){
  const W = waveC.width, H = waveC.height, mid = H/2, amp = H*0.34;
  const border = css('--border-strong'), txt = css('--text-muted');
  wctx.clearRect(0,0,W,H);
  wctx.strokeStyle = border; wctx.lineWidth = 1;
  wctx.beginPath(); wctx.moveTo(0,mid); wctx.lineTo(W,mid); wctx.stroke();
  const k = freq*2*Math.PI/W*2;
  const phi = modes[mode].phi;
  const plot = (color, ph)=>{
    wctx.strokeStyle = color; wctx.lineWidth = 2.5; wctx.beginPath();
    for(let x=0;x<=W;x++){
      const y = mid - amp*Math.sin(k*x - t + ph);
      x===0 ? wctx.moveTo(x,y) : wctx.lineTo(x,y);
    }
    wctx.stroke();
  };
  plot('#378ADD', 0);
  plot('#D85A30', phi);

  const PW = phC.width, PH = phC.height, cx = PW/2, cy = PH/2, r = 62;
  pctx.clearRect(0,0,PW,PH);
  pctx.strokeStyle = border; pctx.lineWidth = 1;
  pctx.beginPath(); pctx.arc(cx,cy,r,0,2*Math.PI); pctx.stroke();
  pctx.beginPath(); pctx.moveTo(cx-r-8,cy); pctx.lineTo(cx+r+8,cy); pctx.stroke();
  const arrow = (ang,color)=>{
    const ex = cx + r*Math.cos(ang), ey = cy - r*Math.sin(ang);
    pctx.strokeStyle = color; pctx.fillStyle = color; pctx.lineWidth = 3;
    pctx.beginPath(); pctx.moveTo(cx,cy); pctx.lineTo(ex,ey); pctx.stroke();
    const a = Math.atan2(cy-ey, ex-cx);
    pctx.beginPath();
    pctx.moveTo(ex,ey);
    pctx.lineTo(ex-9*Math.cos(a-0.4), ey+9*Math.sin(a-0.4));
    pctx.lineTo(ex-9*Math.cos(a+0.4), ey+9*Math.sin(a+0.4));
    pctx.closePath(); pctx.fill();
  };
  arrow(t, '#378ADD');
  arrow(t + phi, '#D85A30');
  pctx.fillStyle = txt; pctx.font = '12px sans-serif'; pctx.textAlign = 'center';
  pctx.fillText('Zeigerdiagramm', cx, PH-6);

  if(!paused) t += 0.03*freq/2;
  requestAnimationFrame(draw);
}
setMode('R');
draw();
</script>
